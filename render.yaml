services:
  - type: web
    name: lpicture-voice-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 30
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: MANYCHAT_API_TOKEN
        sync: false
